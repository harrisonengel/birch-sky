# /etc/nginx/sites-available/ie
# Symlink to sites-enabled, then run: sudo nginx -t && sudo systemctl reload nginx
# After setup, run certbot to add TLS:
#   sudo certbot --nginx -d YOUR_DOMAIN --non-interactive --agree-tos -m you@email.com

server {
    listen 80;
    server_name _; # Replace _ with your domain before running certbot

    root /var/www/ie;
    index index.html;

    # --- Frontend (SPA) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Market Platform API ---
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- Health check (pass-through to market-platform) ---
    location = /health {
        proxy_pass http://127.0.0.1:8080;
    }

    location = /ready {
        proxy_pass http://127.0.0.1:8080;
    }

    # --- Agent Harness (rewrite /agent/* -> /api/*) ---
    location /agent/ {
        rewrite ^/agent/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Agent sessions can take a while
        proxy_read_timeout 120s;
    }

    # --- Block direct access to internal ports ---
    location ~* ^/(9200|9000|9001|5432) {
        return 404;
    }
}
