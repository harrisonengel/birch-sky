model:
  name: "claude-sonnet-4-5"
  api_key_env: "ANTHROPIC_API_KEY"

opensearch:
  url: "http://localhost:9200"
  index: "listings"
  # user: ""
  # pass: ""

session:
  mode: "context"
  max_turns: 20
  starting_context:
    background: "You work for a hedge fund researching alternative data sources."
    goal: "Find datasets related to satellite imagery of retail parking lots."
    constraints: "Budget under $500 per dataset. Prefer weekly update frequency."
