# Top-level end-to-end demo stack.
#
#   docker compose up --build
#
# Wait until the `seed` service exits 0, then open http://localhost:5173.
#
# Services:
#   postgres, opensearch, minio — infra
#   market-platform             — Go marketplace API (port 8080, MCP on 8081)
#   seed                        — oneshot; runs `iecli seed` once market-platform is healthy
#   harness                     — Python buyer-agent sandbox runner (internal 8000)
#   agent-prepper               — Python clarification service (internal 8002)
#   frontend                    — Vite dev server (5173)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ieuser
      POSTGRES_PASSWORD: iepass
      POSTGRES_DB: iemarket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ieuser -d iemarket"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:3.5.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - plugins.ml_commons.only_run_on_ml_node=false
      - plugins.ml_commons.allow_registering_model_via_url=true
      - plugins.ml_commons.model_access_control_enabled=false
      - plugins.ml_commons.native_memory_threshold=99
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  market-platform:
    build:
      context: ./src/market-platform
    ports:
      - "8080:8080"
      - "8088:8081"
    environment:
      DATABASE_URL: postgres://ieuser:iepass@postgres:5432/iemarket?sslmode=disable
      OPENSEARCH_URL: http://opensearch:9200
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: market-data
      MINIO_USE_SSL: "false"
      HTTP_PORT: "8080"
      MCP_PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      # First boot downloads + deploys the ML embedding model into
      # OpenSearch (~80MB). Give it up to 5 minutes before health
      # checks start counting toward unhealthy.
      start_period: 300s

  # Oneshot container: waits for market-platform to be healthy, then runs
  # `iecli seed` once. Reuses the market-platform Dockerfile so the iecli
  # binary is available at /usr/local/bin/iecli. On re-up without `down
  # -v`, seller creation errors on duplicate email — wipe volumes for a
  # fresh seed.
  seed:
    build:
      context: ./src/market-platform
    depends_on:
      market-platform:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/iecli"]
    command:
      - "--api=http://market-platform:8080"
      - "--database-url=postgres://ieuser:iepass@postgres:5432/iemarket?sslmode=disable"
      - "seed"
    restart: "no"

  harness:
    build:
      context: ./src/harness
    ports:
      - "8081:8000"
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: listings
      MODEL_NAME: claude-sonnet-4-5
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      opensearch:
        condition: service_healthy

  agent-prepper:
    build:
      context: ./src/agent_prepper
    ports:
      - "8082:8002"
    environment:
      MODEL_NAME: claude-sonnet-4-5
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PREPPER_MAX_TURNS: "6"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      MARKET_PLATFORM_URL: http://market-platform:8080
      HARNESS_URL: http://harness:8000
      PREPPER_URL: http://agent-prepper:8002
      VITE_AUTH_MODE: local
    depends_on:
      - market-platform
      - harness
      - agent-prepper

volumes:
  pgdata:
  osdata:
  miniodata:
