name: Persona Reviews

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  determine-personas:
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    outputs:
      personas: ${{ steps.get-labels.outputs.personas }}
      has_personas: ${{ steps.get-labels.outputs.has_personas }}
    steps:
      - name: Extract review labels
        id: get-labels
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          python3 - <<'EOF'
          import json, os

          labels = json.loads(os.environ["LABELS_JSON"])
          valid_personas = {
              "architect", "decision-reviewer", "designer", "experimenter",
              "programmer", "project-manager", "quality-assurance", "security"
          }
          personas = [
              l["name"][len("review:"):]
              for l in labels
              if l["name"].startswith("review:") and l["name"][len("review:"):] in valid_personas
          ]
          has_personas = "true" if personas else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"personas={json.dumps(personas)}\n")
              f.write(f"has_personas={has_personas}\n")

          print(f"Personas to review: {personas}")
          EOF

  review:
    needs: determine-personas
    if: needs.determine-personas.outputs.has_personas == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        persona: ${{ fromJson(needs.determine-personas.outputs.personas) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

      - name: Read persona skill file
        run: |
          cp .claude/skills/${{ matrix.persona }}/SKILL.md /tmp/skill.md

      - name: Generate persona review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "$PR_BODY" > /tmp/pr_body.txt
          python3 .github/scripts/persona_review.py \
            --persona "${{ matrix.persona }}" \
            --skill-file /tmp/skill.md \
            --diff-file /tmp/pr_diff.txt \
            --pr-title "$PR_TITLE" \
            --pr-body-file /tmp/pr_body.txt \
            --output /tmp/review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/review.md \
            --repo ${{ github.repository }}

  persona-reviews-complete:
    if: always() && startsWith(github.head_ref, 'claude/')
    needs: [determine-personas, review]
    runs-on: ubuntu-latest
    steps:
      - name: Check review results
        run: |
          HAS_PERSONAS="${{ needs.determine-personas.outputs.has_personas }}"
          if [[ "$HAS_PERSONAS" != "true" ]]; then
            echo "No review:* labels — persona reviews not requested."
            exit 0
          fi
          if [[ "${{ needs.review.result }}" != "success" ]]; then
            echo "One or more persona reviews failed."
            exit 1
          fi
          echo "All persona reviews completed successfully."
