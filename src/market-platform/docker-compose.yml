services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ieuser
      POSTGRES_PASSWORD: iepass
      POSTGRES_DB: iemarket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ieuser -d iemarket"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:3.0.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - knn.plugin.enabled=true
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  market-platform:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://ieuser:iepass@postgres:5432/iemarket?sslmode=disable
      OPENSEARCH_URL: http://opensearch:9200
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: market-data
      MINIO_USE_SSL: "false"
      HTTP_PORT: "8080"
      MCP_PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent-harness:
    build:
      context: ../../harness
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: listings
      MODEL_NAME: claude-sonnet-4-5
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent-prepper:
    build:
      context: ../../agent_prepper
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      MODEL_NAME: claude-sonnet-4-5
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PREPPER_MAX_TURNS: "6"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8002/health\")' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  osdata:
  miniodata:
